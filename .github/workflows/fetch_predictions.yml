name: Fetch Predictions

on:
  workflow_dispatch:
  # Uncomment to auto-fetch a closing snapshot ~30 min before typical NHL
  # puck drop (7pm ET), which would tighten CLV closing-line quality on
  # nights nobody manually re-fetches late -- raises Actions minutes/API
  # usage, so left disabled pending a deliberate decision.
  # schedule:
  #   - cron: '30 22 * * *'  # 22:30 UTC = 6:30pm EST / 5:30pm EDT

permissions:
  contents: write

jobs:
  fetch-predictions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetch and predict
        run: python scripts/fetch_and_predict.py --verbose
        env:
          TZ: America/New_York
          API_KEY: ${{ secrets.THE_ODDS_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/betting.db betting_tracker.xlsx

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Fetch predictions - $(TZ=America/New_York date +'%Y-%m-%d %H:%M %Z')"

          # Direct push to main -- retry a few times in case another workflow
          # (record_bet, update_results, or another fetch_predictions run)
          # pushed in between our checkout and our push.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push rejected (attempt $attempt), rebasing onto latest main..."
            git fetch origin main

            if ! git rebase origin/main; then
              git rebase --abort
              echo "::error::Rebase conflict against main (likely a concurrent update to data/betting.db). Re-run this workflow."
              exit 1
            fi
          done

          echo "::error::Failed to push after 5 attempts"
          exit 1
