name: Update Betting Results

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update betting results
        run: python scripts/update_betting_results.py
        env:
          TZ: America/New_York

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/betting.db betting_tracker.xlsx

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update betting results - $(TZ=America/New_York date -d 'yesterday' +'%Y-%m-%d')"

          # Direct push to main -- retry a few times in case another workflow
          # (record_bet, fetch_predictions, or another update_results run)
          # pushed in between our checkout and our push.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push rejected (attempt $attempt), rebasing onto latest main..."
            git fetch origin main

            if ! git rebase origin/main; then
              git rebase --abort
              echo "::error::Rebase conflict against main (likely a concurrent update to data/betting.db). Re-run this workflow."
              exit 1
            fi
          done

          echo "::error::Failed to push after 5 attempts"
          exit 1
